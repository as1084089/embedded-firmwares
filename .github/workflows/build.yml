name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ARM GCC toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi

      - name: Build
        run: make -C arm-cortex-m3/LM3S6965

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v7
        with:
          name: firmware
          path: |
            arm-cortex-m3/LM3S6965/builds/lm3s6965.elf
            arm-cortex-m3/LM3S6965/builds/lm3s6965.bin
          if-no-files-found: error
